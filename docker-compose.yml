services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: always

  redis:
    image: redis:alpine
    expose:
      - 6379
    restart: always

  api:
    build: .
    expose:
      - 8000
    env_file:
      - .env
    environment:
      - PORT=8000
      - REDIS_HOST=redis
      - RABBITMQ_HOST=${RABBITMQ_HOST:?Set RABBITMQ_HOST to your external RabbitMQ hostname}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
    depends_on:
      - redis
    restart: always

  worker:
    build: .
    command: python -m app.worker
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - RABBITMQ_HOST=${RABBITMQ_HOST:?Set RABBITMQ_HOST to your external RabbitMQ hostname}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
    depends_on:
      - redis
    restart: always

version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: always

  redis:
    image: redis:alpine
    expose:
      - 6379
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    expose:
      - 5672
      - 15672
    restart: always

  api:
    build: .
    expose:
      - 8000
    env_file:
      - .env.example
    environment:
      - PORT=8000
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - redis
      - rabbitmq
    restart: always

  worker:
    build: .
    command: python -m app.worker
    env_file:
      - .env.example
    environment:
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - redis
      - rabbitmq
    restart: always
